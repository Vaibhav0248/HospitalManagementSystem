<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hospital Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container login-container">
        <div class="glass-card">
            <h2 class="text-center mb-4" style="color: var(--primary);">Welcome Back</h2>
            <div th:if="${param.error}" style="color: var(--danger); text-align: center; margin-bottom: 1rem;">
                Invalid username and password.
            </div>
            <div th:if="${param.logout}" style="color: var(--secondary); text-align: center; margin-bottom: 1rem;">
                You have been logged out.
            </div>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
