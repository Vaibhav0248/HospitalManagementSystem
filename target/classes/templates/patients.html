<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients - HMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">🏥 HMS Portal</a>
        <ul class="navbar-nav">
            <li><a href="/dashboard" class="nav-link">Dashboard</a></li>
            <li sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')"><a href="/doctor/list" class="nav-link">Doctors</a></li>
            <li sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF', 'ROLE_DOCTOR')"><a href="/patient/list" class="nav-link active">Patients</a></li>
            <li><a href="/appointment/list" class="nav-link">Appointments</a></li>
            <li sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')"><a href="/billing/list" class="nav-link">Billing</a></li>
            <li>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-danger" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Logout</button>
                </form>
            </li>
        </ul>
    </nav>

    <div class="container">
        <div class="flex-between mb-4">
            <h2>Patients Directory</h2>
            <a href="/patient/add" class="btn btn-primary" sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')">Register Patient</a>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>DOB</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="patient : ${patients}">
                        <td th:text="${patient.id}"></td>
                        <td th:text="${patient.firstName}"></td>
                        <td th:text="${patient.lastName}"></td>
                        <td th:text="${patient.dateOfBirth}"></td>
                        <td th:text="${patient.email}"></td>
                        <td th:text="${patient.phone}"></td>
                        <td class="action-links" sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')">
                            <a th:href="@{/patient/edit/{id}(id=${patient.id})}" class="edit-link">Edit</a>
                            <a th:href="@{/patient/delete/{id}(id=${patient.id})}" class="delete-link" onclick="return confirm('Are you sure?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
