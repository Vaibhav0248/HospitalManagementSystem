<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - HMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">🏥 HMS Portal</a>
        <ul class="navbar-nav">
            <li><a href="/dashboard" class="nav-link">Dashboard</a></li>
            <li sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')"><a href="/doctor/list" class="nav-link">Doctors</a></li>
            <li sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF', 'ROLE_DOCTOR')"><a href="/patient/list" class="nav-link">Patients</a></li>
            <li sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')"><a href="/appointment/list" class="nav-link active">Appointments</a></li>
            <li sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')"><a href="/billing/list" class="nav-link">Billing</a></li>
            <li>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-danger" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Logout</button>
                </form>
            </li>
        </ul>
    </nav>

    <div class="container">
        <div class="flex-between mb-4">
            <h2>Appointments Directory</h2>
            <a href="/appointment/add" class="btn btn-primary" sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')">Book Appointment</a>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Doctor</th>
                        <th>Patient</th>
                        <th>Date & Time</th>
                        <th>Status</th>
                        <th>Priority</th>
                        <th>Notes</th>
                        <th sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')">Billing</th>
                        <th sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="appointment : ${appointments}">
                        <td th:text="${appointment.id}"></td>
                        <td th:text="${appointment.doctor != null ? appointment.doctor.lastName : 'N/A'}"></td>
                        <td th:text="${appointment.patient != null ? appointment.patient.lastName : 'N/A'}"></td>
                        <td th:text="${appointment.appointmentDateTime}"></td>
                        <td>
                        <!-- BOOKED -->
                        <span th:if="${appointment.status == 'SCHEDULED'}"
                            class="badge"
                            style="background: green; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;">
                            SCHEDULED
                        </span>

                        <!-- CANCELLED -->
                        <span th:if="${appointment.status == 'CANCELLED'}"
                            class="badge"
                            style="background: gray; color: rgb(113, 7, 7); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;">
                            CANCELLED
                        </span>

                        <!-- COMPLETED -->
                        <span th:if="${appointment.status == 'COMPLETED'}"
                            class="badge"
                            style="background: blue; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;">
                            COMPLETED
                        </span>
                    </td>
                        <td>
                            <span th:if="${appointment.priority == 'EMERGENCY'}" class="badge" style="background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; font-weight: bold;">EMERGENCY</span>
                            <span th:unless="${appointment.priority == 'EMERGENCY'}" th:text="${appointment.priority}"></span>
                        </td>
                        <td th:text="${appointment.notes}"></td>
                        <td sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')" 
    style="padding: 6px;">

    <!-- Generate Bill (Green) -->
    <a th:if="${appointment.status == 'COMPLETED'}"
       th:href="@{/billing/generate/{id}(id=${appointment.id})}"
       style="background-color: #28a745; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; font-size: 0.85rem; display: inline-block;"
       onmouseover="this.style.backgroundColor='#1e7e34'"
       onmouseout="this.style.backgroundColor='#28a745'">
       Generate Bill
    </a>

</td>

<td sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')" 
    style="display: flex; gap: 8px; align-items: center;">

    <!-- Edit (Blue) -->
    <a th:href="@{/appointment/edit/{id}(id=${appointment.id})}"
       style="background-color: #007bff; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; font-size: 0.85rem;"
       onmouseover="this.style.backgroundColor='#0056b3'"
       onmouseout="this.style.backgroundColor='#007bff'">
       Edit
    </a>

    <!-- Cancel (Red) -->
    <a th:href="@{/appointment/cancel/{id}(id=${appointment.id})}"
       style="background-color: #dc3545; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; font-size: 0.85rem;"
       onclick="return confirm('Are you sure you want to cancel this appointment?')"
       onmouseover="this.style.backgroundColor='#b02a37'"
       onmouseout="this.style.backgroundColor='#dc3545'">
       Cancel
    </a>

</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
