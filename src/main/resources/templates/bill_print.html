<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Format - HMS</title>
    <style>
        body {
            font-family: monospace;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 40px;
            color: #333;
        }
        .bill-container {
            background: white;
            padding: 30px;
            width: 400px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 4px;
            line-height: 1.6;
        }
        .text-center { text-align: center; }
        .separator {
            border-bottom: 1px dashed #333;
            margin: 15px 0;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
        }
        .btn-print {
            display: block;
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            text-align: center;
            text-decoration: none;
            margin-top: 20px;
            border-radius: 4px;
            font-family: sans-serif;
            cursor: pointer;
            border: none;
        }
        @media print {
            .btn-print, .back-link {
                display: none;
            }
            body { background: white; padding: 0; }
            .bill-container { box-shadow: none; width: 100%; }
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #666;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div>
        <div class="bill-container">
            <div class="separator"></div>
            <h3 class="text-center" style="margin: 0; font-weight: normal;">HOSPITAL MANAGEMENT SYSTEM</h3>
            <div class="separator"></div>
            
            <p>Bill ID: <span th:text="${billing.id}"></span><br>
            Date: <span th:text="${#temporals.format(billing.billingDate, 'dd-MM-yyyy')}"></span></p>

            <p>Patient Name: <span th:text="${billing.patient.firstName + ' ' + billing.patient.lastName}"></span><br>
            Doctor Name : <span th:text="${'Dr. ' + billing.appointment.doctor.firstName + ' ' + billing.appointment.doctor.lastName}"></span><br>
            Specialization: <span th:text="${billing.appointment.doctor.specialization}"></span></p>

            <div class="separator"></div>
            <p style="margin-bottom: 5px;">Services:</p>
            
            <div class="flex-between">
                <span>Consultation Fee</span>
                <span th:text="${'₹' + billing.consultationFee}"></span>
            </div>
            
            <div class="flex-between" th:if="${billing.testType != 'None' && billing.testFee > 0}">
                <span th:text="${billing.testType}"></span>
                <span th:text="${'₹' + billing.testFee}"></span>
            </div>
            
            <div class="flex-between" th:if="${billing.medicinesFee != null && billing.medicinesFee > 0}">
                <span>Medicines</span>
                <span th:text="${'₹' + billing.medicinesFee}"></span>
            </div>

            <div class="separator"></div>
            
            <div class="flex-between">
                <span>Subtotal</span>
                <span th:text="${'₹' + (billing.consultationFee + (billing.testFee != null ? billing.testFee : 0) + (billing.medicinesFee != null ? billing.medicinesFee : 0))}"></span>
            </div>
            
            <div class="flex-between" th:if="${billing.discount != null && billing.discount > 0}">
                <span>Discount</span>
                <span th:text="${'₹' + billing.discount}"></span>
            </div>
            
            <div class="flex-between">
                <span>GST (18%)</span>
                <span th:text="${'₹' + billing.gst}"></span>
            </div>

            <div class="separator"></div>
            <div class="flex-between" style="font-weight: bold;">
                <span>TOTAL</span>
                <span th:text="${'₹' + billing.totalAmount}"></span>
            </div>
            <div class="separator"></div>

            <p>Payment Mode: <span th:text="${billing.paymentMode}"></span><br>
            Status: <span th:text="${billing.status}"></span></p>

            <p class="text-center" style="margin-top: 20px;">Thank you! Get well soon 😊</p>
        </div>
        
        <button class="btn-print" onclick="window.print()">Print Bill</button>
        <a href="/appointment/list" class="back-link">Back to Appointments</a>
    </div>
</body>
</html>
