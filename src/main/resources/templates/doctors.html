<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors - HMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .day-column {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 10px;
            min-height: 150px;
        }

        .day-header {
            font-weight: 600;
            text-align: center;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 5px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .day-date {
            font-size: 0.8rem;
            color: #6b7280;
            text-align: center;
            display: block;
            margin-bottom: 10px;
        }

        .appt-slot {
            background: #fee2e2;
            color: #991b1b;
            padding: 5px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-align: center;
            border: 1px solid #fca5a5;
        }

        .no-appt {
            color: #10b981;
            font-size: 0.8rem;
            text-align: center;
            font-style: italic;
        }

        .btn-info {
            background-color: #17a2b8;
            color: white;
            padding: 0.4rem 0.8rem;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-info:hover {
            background-color: #138496;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">🏥 HMS Portal</a>
        <ul class="navbar-nav">
            <li><a href="/dashboard" class="nav-link">Dashboard</a></li>
            <li sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')"><a href="/doctor/list"
                    class="nav-link active">Doctors</a></li>
            <li sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF', 'ROLE_DOCTOR')"><a href="/patient/list"
                    class="nav-link">Patients</a></li>
            <li><a href="/appointment/list" class="nav-link">Appointments</a></li>
            <li sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_STAFF')"><a href="/billing/list"
                    class="nav-link">Billing</a></li>
            <li>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-danger"
                        style="padding: 0.5rem 1rem; font-size: 0.9rem;">Logout</button>
                </form>
            </li>
        </ul>
    </nav>

    <div class="container">
        <div class="flex-between mb-4">
            <h2>Doctors Directory</h2>
            <a href="/doctor/add" class="btn btn-primary" sec:authorize="hasAnyAuthority('ROLE_ADMIN')">Add New
                Doctor</a>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Specialization</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Availability</th>
                        <th sec:authorize="hasAnyAuthority('ROLE_ADMIN')">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="doctor : ${doctors}">
                        <td th:text="${doctor.id}"></td>
                        <td th:text="${doctor.firstName}"></td>
                        <td th:text="${doctor.lastName}"></td>
                        <td th:text="${doctor.specialization}"></td>
                        <td th:text="${doctor.email}"></td>
                        <td th:text="${doctor.phone}"></td>
                        <td>
                            <button class="btn-info"
                                th:onclick="showAvailability([[${doctor.id}]], [[${doctor.firstName} + ' ' + ${doctor.lastName}]])">
                                View Schedule
                            </button>
                        </td>
                        <td class="action-links" sec:authorize="hasAnyAuthority('ROLE_ADMIN')">
                            <a th:href="@{/doctor/edit/{id}(id=${doctor.id})}" class="edit-link">Edit</a>
                            <a th:href="@{/doctor/delete/{id}(id=${doctor.id})}" class="delete-link"
                                onclick="return confirm('Are you sure?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Availability Modal -->
    <div id="availabilityModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modalDoctorName" style="margin-top: 0; margin-bottom: 5px;">Doctor Schedule</h3>
            <p style="color: #6b7280; font-size: 0.9rem; margin-top: 0;">Showing availability for the current week</p>

            <div class="week-grid" id="weekGrid">
                <!-- Days will be populated here by JS -->
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        // Get the current week dates (Sunday to Saturday)
        function getCurrentWeekDates() {
            const today = new Date();
            const currentDay = today.getDay(); // 0 (Sun) to 6 (Sat)
            const dates = [];

            // Calculate Sunday of the current week
            const sunday = new Date(today);
            sunday.setDate(today.getDate() - currentDay);

            for (let i = 0; i < 7; i++) {
                const d = new Date(sunday);
                d.setDate(sunday.getDate() + i);
                dates.push(d);
            }
            return dates;
        }

        function formatDateForApi(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        async function showAvailability(doctorId, doctorName) {
            document.getElementById('modalDoctorName').innerText = `Dr. ${doctorName}'s Schedule`;
            const grid = document.getElementById('weekGrid');
            grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 20px;">Loading schedule...</div>';

            const modal = document.getElementById('availabilityModal');
            modal.style.display = "block";

            const weekDates = getCurrentWeekDates();

            try {
                grid.innerHTML = ''; // Clear loading text

                // Fetch data for each day
                for (let i = 0; i < 7; i++) {
                    const date = weekDates[i];
                    const dateStr = formatDateForApi(date);
                    const dayName = daysOfWeek[i];
                    const displayDate = date.toLocaleDateString([], { month: 'short', day: 'numeric' });

                    const col = document.createElement('div');
                    col.className = 'day-column';

                    const header = document.createElement('div');
                    header.className = 'day-header';
                    header.innerText = dayName;

                    const dateLabel = document.createElement('span');
                    dateLabel.className = 'day-date';
                    dateLabel.innerText = displayDate;

                    col.appendChild(header);
                    col.appendChild(dateLabel);

                    const slotsContainer = document.createElement('div');

                    // Fetch appointments for this day
                    const response = await fetch(`/api/doctors/${doctorId}/appointments?date=${dateStr}`);
                    if (response.ok) {
                        const appointments = await response.json();

                        if (appointments.length === 0) {
                            slotsContainer.innerHTML = '<div class="no-appt">Available</div>';
                        } else {
                            appointments.forEach(appt => {
                                const dt = new Date(appt.appointmentDateTime);
                                const timeStr = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                                const slot = document.createElement('div');
                                slot.className = 'appt-slot';
                                slot.innerText = `${timeStr} (Booked)`;
                                slotsContainer.appendChild(slot);
                            });
                        }
                    } else {
                        slotsContainer.innerHTML = '<div class="no-appt" style="color: red;">Error loading</div>';
                    }

                    col.appendChild(slotsContainer);
                    grid.appendChild(col);
                }
            } catch (error) {
                console.error("Failed to load availability", error);
                grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: red;">Failed to load schedule. Try again later.</div>';
            }
        }

        function closeModal() {
            document.getElementById('availabilityModal').style.display = "none";
        }

        // Close modal if user clicks outside of it
        window.onclick = function (event) {
            const modal = document.getElementById('availabilityModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
        /*]]>*/
    </script>
</body>

</html>
