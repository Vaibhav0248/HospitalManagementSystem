<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Patient - HMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">🏥 HMS Portal</a>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="glass-card">
            <h2 class="mb-4">Patient Details</h2>
            <form th:action="@{/patient/save}" th:object="${patient}" method="post">
                <input type="hidden" th:field="*{id}" />
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" th:field="*{firstName}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" th:field="*{lastName}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" th:field="*{dateOfBirth}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" th:field="*{phone}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Medical History</label>
                    <textarea th:field="*{medicalHistory}" class="form-control" rows="4"></textarea>
                </div>
                <div class="flex-between mt-4">
                    <a href="/patient/list" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Patient</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
